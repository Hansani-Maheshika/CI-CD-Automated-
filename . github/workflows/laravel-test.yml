name: Laravel Test
on: [push, pull_request]
jobs:
  laravel-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
      - uses: actions/checkout

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          extensions: mbstring, bcmath, pdo_mysql



   
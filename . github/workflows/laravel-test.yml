name: Laravel Test
on: [push, pull_request]
jobs:
  laravel-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          extensions: mbstring, bcmath, pdo_mysql

          name: Config env file
          run: php -r "file_exists('.env') || copy('.env.example', '.env');"



   